<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>
body { margin:0; font-family:Poppins; background:#f3f4f6; }

header {
  background:#16a34a;
  color:white;
  text-align:center;
  padding:15px;
}

.search { padding:10px; }
.search input {
  width:100%; padding:10px; border-radius:8px; border:none;
}

.filters {
  display:flex; overflow:auto; gap:8px; padding:10px;
}
.filters button {
  border:none; padding:6px 12px; border-radius:20px;
}
.filters button.active {
  background:#16a34a; color:white;
}

.products {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
  gap:10px;
  padding:10px;
}

.card {
  background:white;
  border-radius:10px;
  padding:10px;
  text-align:center;
}

.card img {
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:8px;
}

.rating { color:gold; font-size:14px; }

.card button {
  width:100%;
  padding:8px;
  background:#16a34a;
  color:white;
  border:none;
  border-radius:6px;
  margin-top:5px;
}

.cart-btn {
  position:fixed;
  bottom:20px;
  right:20px;
  background:#ef4444;
  color:white;
  padding:15px;
  border-radius:50%;
}

.cart {
  position:fixed;
  right:-100%;
  top:0;
  width:100%;
  max-width:400px;
  height:100%;
  background:white;
  transition:0.3s;
  padding:15px;
  overflow:auto;
}
.cart.active { right:0; }

.cart-item {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

button { cursor:pointer; }

.whatsapp {
  position:fixed;
  bottom:20px;
  left:20px;
  background:#25D366;
  padding:12px;
  border-radius:50%;
  color:white;
  text-decoration:none;
}
</style>
</head>

<body>

<header>
<h2>Your Shop Name</h2>
<p>Fast delivery in your area 🚀</p>
</header>

<div class="search">
<input type="text" id="search" placeholder="Search..." onkeyup="renderProducts()">
</div>

<div class="filters" id="filters"></div>

<div class="products" id="products"></div>

<div class="cart-btn" onclick="toggleCart()">🛒 <span id="count">0</span></div>

<div class="cart" id="cart">
<h3>Your Cart</h3>
<div id="cartItems"></div>

<p>Total: ₹<span id="total">0</span></p>
<p>Discount: ₹<span id="discount">0</span></p>

<form action="https://formspree.io/f/YOUR_FORM_ID" method="POST" onsubmit="prepareOrder()">
<input type="text" name="name" placeholder="Name" required>
<input type="text" name="phone" placeholder="Phone" required>
<textarea name="address" placeholder="Address" required></textarea>

<input type="hidden" name="order" id="orderData">

<button type="submit">Place Order</button>
</form>

<button onclick="toggleCart()">Close</button>
</div>

<a class="whatsapp" href="https://wa.me/91XXXXXXXXXX">💬</a>

<script>
const products = [
{ id:1,name:"Atta",price:280,category:"Groceries",img:"https://i.ibb.co/5n6JbqS/atta.jpg",rating:4 },
{ id:2,name:"Milk",price:60,category:"Dairy",img:"https://i.ibb.co/3m0zJ6G/milk.jpg",rating:4 },
{ id:3,name:"Maggi",price:14,category:"Snacks",img:"https://i.ibb.co/YpG7z7m/maggi.jpg",rating:5 },
{ id:4,name:"Rice",price:350,category:"Groceries",img:"https://i.ibb.co/t4r8nXQ/rice.jpg",rating:5 },
{ id:5,name:"Biscuits",price:30,category:"Snacks",img:"https://i.ibb.co/G7h6Q9S/biscuit.jpg",rating:3 },
{ id:6,name:"Juice",price:120,category:"Drinks",img:"https://i.ibb.co/Qk6hJrF/juice.jpg",rating:4 }
];

let cart = JSON.parse(localStorage.getItem("cart")) || {};
let filter="All";

function renderProducts(){
  let search=document.getElementById("search").value.toLowerCase();
  let box=document.getElementById("products");
  box.innerHTML="";

  products
  .filter(p => filter==="All" || p.category===filter)
  .filter(p => p.name.toLowerCase().includes(search))
  .forEach(p=>{
    box.innerHTML+=`
    <div class="card">
      <img src="${p.img}" loading="lazy">
      <h4>${p.name}</h4>
      <div class="rating">${"⭐".repeat(p.rating)}</div>
      <p>₹${p.price}</p>
      <button onclick="addToCart(${p.id})">Add</button>
    </div>`;
  });
}

function renderFilters(){
  let cats=["All",...new Set(products.map(p=>p.category))];
  let box=document.getElementById("filters");

  cats.forEach(c=>{
    let btn=document.createElement("button");
    btn.innerText=c;
    btn.onclick=()=>{
      filter=c;
      renderProducts();
    };
    box.appendChild(btn);
  });
}

function addToCart(id){
  cart[id]=(cart[id]||0)+1;
  updateCart();
}

function updateCart(){
  localStorage.setItem("cart",JSON.stringify(cart));
  document.getElementById("count").innerText =
    Object.values(cart).reduce((a,b)=>a+b,0);
  renderCart();
}

function renderCart(){
  let box=document.getElementById("cartItems");
  box.innerHTML="";
  let total=0;

  for(let id in cart){
    let p=products.find(x=>x.id==id);
    let qty=cart[id];
    total+=p.price*qty;

    box.innerHTML+=`
    <div class="cart-item">
      ${p.name} x${qty}
      <div>
        <button onclick="changeQty(${id},-1)">-</button>
        <button onclick="changeQty(${id},1)">+</button>
      </div>
    </div>`;
  }

  let discount = total>500 ? 50 : 0;

  document.getElementById("discount").innerText=discount;
  document.getElementById("total").innerText=total-discount;
}

function changeQty(id,delta){
  cart[id]+=delta;
  if(cart[id]<=0) delete cart[id];
  updateCart();
}

function toggleCart(){
  document.getElementById("cart").classList.toggle("active");
}

function prepareOrder(){
  let text="Order:\n";
  let total=0;

  for(let id in cart){
    let p=products.find(x=>x.id==id);
    let qty=cart[id];
    total+=p.price*qty;
    text+=`${p.name} x${qty} = ₹${p.price*qty}\n`;
  }

  let discount = total>500 ? 50 : 0;
  total -= discount;

  text+=`\nDiscount: ₹${discount}\nTotal: ₹${total}`;

  document.getElementById("orderData").value=text;

  localStorage.removeItem("cart");
}

renderFilters();
renderProducts();
updateCart();
</script>

</body>
</html>
